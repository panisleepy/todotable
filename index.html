<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>Working Table Diary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Diagnostics: show load/runtime errors on screen when present -->
  <script>
    (function () {
      function box() {
        var d = document.getElementById("__errbox");
        if (!d) {
          d = document.createElement("pre");
          d.id = "__errbox";
          d.style.cssText =
            "position:fixed;inset:0;z-index:99999;margin:0;padding:16px;background:#fff;color:#c00;font:12px/1.5 monospace;white-space:pre-wrap;overflow:auto";
          (document.body || document.documentElement).appendChild(d);
        }
        return d;
      }
      window.addEventListener(
        "error",
        function (e) {
          var t = e.target;
          if (t && (t.src || t.href)) {
            box().textContent += "[resource load failed] " + (t.src || t.href) + "\n";
          } else {
            box().textContent +=
              "[error] " + (e.message || "") +
              (e.filename ? " @ " + e.filename + ":" + e.lineno : "") + "\n";
          }
        },
        true
      );
      window.addEventListener("unhandledrejection", function (e) {
        var r = e.reason;
        box().textContent +=
          "[promise] " + (r && (r.stack || r.message) ? r.stack || r.message : r) + "\n";
      });
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Noto+Sans+TC:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    html, body { height: 100%; margin: 0; background: #f5e9e2; }
    #root { width: 100vw; height: 100vh; }
  </style>

  <!-- Local vendor bundle (offline / packaged builds) -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="v2/i18n.jsx"></script>
  <script type="text/babel" src="v2/store.jsx"></script>
  <script type="text/babel" src="v2/ai.jsx"></script>
  <script type="text/babel" src="v2/views-shared.jsx"></script>
  <script type="text/babel" src="v2/music.jsx"></script>
  <script type="text/babel" src="v2/view-today.jsx"></script>
  <script type="text/babel" src="v2/view-todo.jsx"></script>
  <script type="text/babel" src="v2/view-cheat.jsx"></script>
  <script type="text/babel" src="v2/view-mail.jsx"></script>
  <script type="text/babel" src="v2/view-prompt.jsx"></script>
  <script type="text/babel" src="v2/view-ai.jsx"></script>
  <script type="text/babel" src="v2/view-retro.jsx"></script>
  <script type="text/babel" src="v2/timer.jsx"></script>
  <script type="text/babel" src="v2/tracker.jsx"></script>
  <script type="text/babel" src="v2/photocard.jsx"></script>
  <script type="text/babel" src="v2/side-dock-v2.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "dockSide": "right",
      "tabSide": "right",
      "tabAccent": "#ffc7d4",
      "showFakeIde": true,
      "desktopMode": false
    }/*EDITMODE-END*/;

    // In Tauri: enable transparent desktop mode automatically
    const runningInTauri = !!(window.__TAURI__ || window.__TAURI_INTERNALS__);
    if (runningInTauri) TWEAK_DEFAULTS.desktopMode = true;
    document.documentElement.setAttribute("data-desktop-mode", String(TWEAK_DEFAULTS.desktopMode));

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const { t: tr } = useI18n();
      React.useEffect(() => {
        document.documentElement.setAttribute("data-desktop-mode", String(t.desktopMode));
        document.title = tr("app.pageTitle");
      }, [t.desktopMode, tr]);
      return (
        <>
          <SideDockV2 tweaks={t} />
          <ActivityTracker />
          <RetroModal />
          <TweaksPanel title={tr("tweaks.title")}>
            <TweakSection label={tr("tweaks.layout")}>
              <TweakToggle
                label={tr("tweaks.desktopMode")}
                value={t.desktopMode}
                onChange={(v) => setTweak("desktopMode", v)}
              />
              <TweakRadio
                label={tr("tweaks.dockSide")}
                value={t.dockSide}
                onChange={(v) => setTweak("dockSide", v)}
                options={[
                  { value: "left",  label: tr("tweaks.dockLeft") },
                  { value: "right", label: tr("tweaks.dockRight") },
                ]}
              />
              <TweakRadio
                label={tr("tweaks.tabSide")}
                value={t.tabSide}
                onChange={(v) => setTweak("tabSide", v)}
                options={[
                  { value: "right", label: tr("tweaks.tabOutside") },
                  { value: "left",  label: tr("tweaks.tabInside") },
                ]}
              />
            </TweakSection>
            <TweakSection label={tr("tweaks.accent")}>
              <TweakColor
                label={tr("tweaks.pointColor")}
                value={t.tabAccent}
                onChange={(v) => {
                  setTweak("tabAccent", v);
                  document.documentElement.style.setProperty("--hi", v);
                }}
                options={["#ffc7d4", "#c5e8d4", "#c8dffb", "#d8cdf5", "#fff4c0", "#ffd3b6"]}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    document.documentElement.style.setProperty("--hi", TWEAK_DEFAULTS.tabAccent);

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
